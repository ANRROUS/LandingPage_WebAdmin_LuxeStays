<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta 3 - Diagonal Split con Partículas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;height:100vh;overflow:hidden;background:#0a0a0a}
.split-bg{position:fixed;inset:0;display:flex}
.split-left{width:55%;position:relative;overflow:hidden}
.split-left img{width:100%;height:100%;object-fit:cover}
.split-left::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,transparent 60%,#0a0a0a)}
.diagonal-cut{position:fixed;top:0;right:0;width:55%;height:100%;background:#0a0a0a;clip-path:polygon(15% 0,100% 0,100% 100%,0 100%);z-index:2}
.particles{position:fixed;inset:0;z-index:1;pointer-events:none}
.particle{position:absolute;width:4px;height:4px;background:#bc8c00;border-radius:50%;opacity:.4;animation:floatUp var(--dur) linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}50%{opacity:.6}100%{transform:translateY(-10vh) scale(1);opacity:0}}
.form-wrapper{position:fixed;right:0;top:0;width:45%;height:100%;z-index:3;display:flex;align-items:center;justify-content:center;padding:40px}
.form-card{width:100%;max-width:400px}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.brand img{width:50px;height:50px}
.brand h2{color:#fff;font-size:1.4rem;font-weight:700}
.subtitle{color:#777;font-size:.9rem;margin-bottom:36px}
.form-title{color:#fff;font-size:1.8rem;font-weight:700;margin-bottom:8px}
.tab-pills{display:flex;gap:8px;margin-bottom:28px}
.pill{padding:8px 20px;border-radius:20px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:500;transition:.3s}
.pill.active{background:#bc8c00;border-color:#bc8c00;color:#fff}
.pill:hover:not(.active){border-color:#bc8c00;color:#bc8c00}
.field{margin-bottom:18px}
.field input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.05);border:1px solid #222;border-radius:12px;color:#fff;font-size:.95rem;outline:none;transition:.3s;font-family:inherit}
.field input:focus{border-color:#bc8c00;box-shadow:0 0 0 3px rgba(188,140,0,0.12)}
.field input::placeholder{color:#555}
.field-error{color:#f87171;font-size:.8rem;margin-top:4px;display:none}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.checkbox-row input[type="checkbox"]{accent-color:#bc8c00;width:16px;height:16px}
.checkbox-row label{color:#888;font-size:.85rem}
.btn-gold{width:100%;padding:15px;background:linear-gradient(135deg,#bc8c00,#e0b300);color:#111;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:.3s;font-family:inherit;letter-spacing:.5px}
.btn-gold:hover{box-shadow:0 8px 32px rgba(188,140,0,0.4);transform:translateY(-2px)}
.alt-link{text-align:center;margin-top:20px;color:#666;font-size:.85rem}
.alt-link a{color:#bc8c00;text-decoration:none;font-weight:600}
.alt-link a:hover{text-decoration:underline}
.form-section{display:none}.form-section.show{display:block}
/* Spinner - 3 dots bounce */
.spinner-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,10,0.9);backdrop-filter:blur(8px);z-index:100;justify-content:center;align-items:center;flex-direction:column;gap:24px}
.spinner-overlay.active{display:flex}
.dots{display:flex;gap:12px}
.dot{width:14px;height:14px;background:#bc8c00;border-radius:50%;animation:bounce .6s ease-in-out infinite alternate}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{transform:translateY(-20px);opacity:.3}}
.spinner-overlay p{color:#fff;font-size:1.1rem;font-weight:500}
</style>
</head>
<body>
<div class="spinner-overlay" id="spinner">
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <p id="spinnerMsg">Iniciando sesión...</p>
</div>

<div class="split-bg">
  <div class="split-left"><img src="images/hotel-pool.png" alt="Resort"></div>
</div>
<div class="diagonal-cut"></div>
<div class="particles" id="particles"></div>

<div class="form-wrapper">
  <div class="form-card">
    <div class="brand"><img src="images/logo.png" alt="Logo"><h2>StayHub</h2></div>
    <p class="subtitle">Panel de Administración de Alojamientos</p>
    <div class="tab-pills">
      <button class="pill active" onclick="sw('login')">Iniciar Sesión</button>
      <button class="pill" onclick="sw('register')">Registrarse</button>
    </div>

    <div class="form-section show" id="fLogin">
      <form onsubmit="go(event,'Verificando credenciales...')">
        <div class="field"><input type="email" placeholder="Correo electrónico" required></div>
        <div class="field"><input type="password" placeholder="Contraseña" required></div>
        <div class="checkbox-row"><input type="checkbox" id="rem"><label for="rem">Recuérdame</label></div>
        <button class="btn-gold" type="submit">Iniciar Sesión</button>
      </form>
      <p class="alt-link">¿Nuevo aquí? <a href="#" onclick="sw('register')">Crea una cuenta</a></p>
    </div>

    <div class="form-section" id="fRegister">
      <form onsubmit="go(event,'Registrando tu cuenta...')">
        <div class="field"><input type="text" placeholder="Nombre de usuario" required></div>
        <div class="field"><input type="email" placeholder="Correo electrónico" required></div>
        <div class="field"><input type="password" placeholder="Contraseña" required></div>
        <button class="btn-gold" type="submit">Crear Cuenta</button>
      </form>
      <p class="alt-link">¿Ya tienes cuenta? <a href="#" onclick="sw('login')">Inicia sesión</a></p>
    </div>
  </div>
</div>

<script>
// Particles
for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.setProperty('--dur',(4+Math.random()*6)+'s');p.style.animationDelay=Math.random()*5+'s';p.style.width=p.style.height=(2+Math.random()*4)+'px';document.getElementById('particles').appendChild(p)}
function sw(t){
  document.querySelectorAll('.pill').forEach((b,i)=>b.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('fLogin').classList.toggle('show',t==='login');
  document.getElementById('fRegister').classList.toggle('show',t==='register');
}
function go(e,msg){
  e.preventDefault();document.getElementById('spinnerMsg').textContent=msg;
  document.getElementById('spinner').classList.add('active');
  setTimeout(()=>document.getElementById('spinner').classList.remove('active'),2500);
}
</script>
</body>
</html>
