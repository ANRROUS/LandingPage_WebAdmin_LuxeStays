<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta 1 - Split Screen Glassmorphism</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;height:100vh;overflow:hidden}
.container{display:flex;height:100vh}
.left-panel{flex:1;position:relative;overflow:hidden}
.left-panel img{width:100%;height:100%;object-fit:cover}
.left-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.5),rgba(188,140,0,0.3));display:flex;flex-direction:column;justify-content:center;padding:60px}
.left-overlay h1{font-size:3rem;font-weight:700;color:#fff;margin-bottom:16px}
.left-overlay p{font-size:1.1rem;color:rgba(255,255,255,0.85);max-width:400px;line-height:1.6}
.right-panel{width:480px;background:#111;display:flex;flex-direction:column;justify-content:center;padding:60px;position:relative}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:40px}
.logo-row img{width:48px;height:48px}
.logo-row span{color:#fff;font-size:1.3rem;font-weight:600}
.tabs{display:flex;gap:0;margin-bottom:32px;border-bottom:2px solid #222}
.tab{flex:1;padding:12px;text-align:center;color:#888;cursor:pointer;font-weight:500;border-bottom:2px solid transparent;transition:.3s}
.tab.active{color:#bc8c00;border-bottom-color:#bc8c00}
.tab:hover{color:#d4a800}
.form-group{margin-bottom:20px}
.form-group label{display:block;color:#aaa;font-size:.85rem;margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:14px 16px;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;font-size:.95rem;outline:none;transition:.3s}
.form-group input:focus{border-color:#bc8c00;box-shadow:0 0 0 3px rgba(188,140,0,0.15)}
.form-group input::placeholder{color:#555}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#bc8c00,#d4a800);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:.3s;position:relative;overflow:hidden}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(188,140,0,0.35)}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#555;font-size:.85rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#333}
.social-btns{display:flex;gap:12px}
.social-btn{flex:1;padding:12px;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;gap:8px;transition:.3s}
.social-btn:hover{border-color:#bc8c00;background:#222}
.switch-text{text-align:center;margin-top:24px;color:#888;font-size:.9rem}
.switch-text a{color:#bc8c00;text-decoration:none;font-weight:500}
.switch-text a:hover{text-decoration:underline}
.errors{background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.3);color:#f87171;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.85rem}
/* Spinner Overlay */
.spinner-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:100;justify-content:center;align-items:center;flex-direction:column;gap:20px}
.spinner-overlay.active{display:flex}
.spinner{width:56px;height:56px;border:4px solid #333;border-top-color:#bc8c00;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-overlay p{color:#fff;font-size:1.1rem;font-weight:500}
/* Register form (hidden by default) */
.form-register{display:none}
.form-login{display:block}
</style>
</head>
<body>
<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner"></div>
  <p id="spinnerText">Iniciando sesión...</p>
</div>

<div class="container">
  <div class="left-panel">
    <img src="images/hotel-lobby.png" alt="Hotel Lobby">
    <div class="left-overlay">
      <h1>Tu próxima<br>aventura<br>comienza aquí</h1>
      <p>Descubre los mejores alojamientos y vive experiencias únicas en destinos increíbles.</p>
    </div>
  </div>
  <div class="right-panel">
    <div class="logo-row">
      <img src="images/logo.png" alt="Logo">
      <span>StayHub Admin</span>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Iniciar Sesión</div>
      <div class="tab" onclick="switchTab('register')">Registrarse</div>
    </div>
    <div id="errorBox" class="errors" style="display:none"></div>

    <!-- LOGIN -->
    <form class="form-login" id="formLogin" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" placeholder="ejemplo@correo.com" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">Iniciar Sesión</button>
      <div class="divider">o continúa con</div>
      <div class="social-btns">
        <button type="button" class="social-btn">&#9993; Google</button>
        <button type="button" class="social-btn">&#9729; GitHub</button>
      </div>
      <p class="switch-text">¿No tienes cuenta? <a href="#" onclick="switchTab('register')">Regístrate</a></p>
    </form>

    <!-- REGISTER -->
    <form class="form-register" id="formRegister" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Nombre de usuario</label>
        <input type="text" placeholder="Tu nombre" required>
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" placeholder="ejemplo@correo.com" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">Registrarse</button>
      <p class="switch-text">¿Ya tienes cuenta? <a href="#" onclick="switchTab('login')">Inicia sesión</a></p>
    </form>
  </div>
</div>

<script>
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',i===(tab==='login'?0:1))});
  document.getElementById('formLogin').style.display=tab==='login'?'block':'none';
  document.getElementById('formRegister').style.display=tab==='register'?'block':'none';
}
function showSpinner(text){
  document.getElementById('spinnerText').textContent=text;
  document.getElementById('spinnerOverlay').classList.add('active');
}
function handleLogin(e){e.preventDefault();showSpinner('Iniciando sesión...');setTimeout(()=>document.getElementById('spinnerOverlay').classList.remove('active'),2500)}
function handleRegister(e){e.preventDefault();showSpinner('Registrando cuenta...');setTimeout(()=>document.getElementById('spinnerOverlay').classList.remove('active'),2500)}
</script>
</body>
</html>
